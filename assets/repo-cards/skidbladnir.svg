<svg xmlns="http://www.w3.org/2000/svg" width="420" height="156" viewBox="0 0 420 156" role="img" aria-labelledby="title desc">
  <title id="title">Skidbladnir repository card</title>
  <desc id="desc">Project scaffolder and structural retrofit tool for repository governance.</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  </style>
  <rect x="1" y="1" width="418" height="154" rx="8" fill="#f6f8fa" stroke="#d0d7de"/>
